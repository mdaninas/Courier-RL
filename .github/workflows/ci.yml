name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: Tests & lint (offline)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # Light, offline-friendly stack: the test-suite runs on the synthetic
      # grid and skips heavy deps (torch/sb3/osmnx) via importorskip, so CI
      # stays fast and needs no network.
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas pyyaml networkx gymnasium pytest ruff

      - name: Lint (ruff)
        run: ruff check src scripts tests
        continue-on-error: true

      - name: Run tests
        run: pytest
