name: Deploy to Hugging Face Spaces

# Mirrors this repo to a Hugging Face Space on every push to main.
# The Space (Docker SDK) then rebuilds the image and serves the live demo.
#
# One-time setup (GitHub repo → Settings):
#   Secrets and variables → Actions:
#     - Secret   HF_TOKEN     = a HF access token with WRITE scope (hf.co/settings/tokens)
#     - Variable HF_USERNAME  = your Hugging Face username
#     - Variable HF_SPACE     = the Space name (e.g. courier-rl)
# Create the Space first at huggingface.co/new-space  (SDK: Docker, blank).

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ vars.HF_USERNAME }}
          HF_SPACE: ${{ vars.HF_SPACE }}
        run: |
          git config user.email "ci@github"
          git config user.name "github-actions"
          git push --force \
            "https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE}.git" \
            HEAD:main
